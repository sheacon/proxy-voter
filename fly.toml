# fly.toml app configuration file generated for proxy-voter on 2026-03-22T17:16:41-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'proxy-voter'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = '/data/proxy_voter.db'
  POLICY_PREFERENCES_PATH = '/app/policy-preferences.md'

[[mounts]]
  source = 'proxy_voter_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
